version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ap_police_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secure_password_123
      POSTGRES_DB: police_command_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ap_police_backend
    environment:
      - DATABASE_URL=postgresql://admin:secure_password_123@db:5432/police_command_db?schema=public
      - JWT_SECRET=super_secret_ap_police_key_2026
      - PORT=3000
    ports:
      - "3000:3000"
    depends_on:
      - db
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ap_police_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
